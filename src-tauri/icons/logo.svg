<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F8CFF"/>
      <stop offset="1" stop-color="#7A5CFF"/>
    </linearGradient>
    <linearGradient id="tFill" x1="320" y1="220" x2="704" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E6EEFF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1B2A66" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Rounded square app background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- Subtle highlight sweep -->
  <path d="M0 228C0 102 102 0 228 0H1024L0 1024V228Z" fill="#FFFFFF" opacity="0.08"/>

  <!-- Letter T -->
  <g filter="url(#soft)">
    <!-- Top bar -->
    <rect x="252" y="276" width="520" height="124" rx="40" fill="url(#tFill)"/>
    <!-- Stem -->
    <rect x="450" y="276" width="124" height="472" rx="40" fill="url(#tFill)"/>
  </g>

  <!-- Translation accent: small language swap arrows under the T -->
  <g opacity="0.95">
    <path d="M412 800h150l-34-34" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M612 856H462l34 34" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
