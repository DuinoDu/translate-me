<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>translate-me</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div class="card">
      <textarea
        id="input"
        rows="1"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        placeholder="输入要翻译的文字…  (Esc 关闭)"
      ></textarea>
      <div id="output" class="output empty">译文…</div>
      <div class="hint">
        <span id="status"></span>
        <span class="hint-right">
          <button id="copy" title="复制译文" tabindex="-1" disabled>复制</button>
          <span id="hk">⌘⇧T</span> · DeepSeek
          <button id="gear" title="设置" tabindex="-1">⚙</button>
        </span>
      </div>
    </div>
  </body>
</html>
